<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: transparent;
			}

			#lightOff {
				display: block;
				width: 100%;
				height: 100%;
				opacity: 0;
				animation: bodycamLightBlink 1s steps(1, end) infinite;
			}

			@keyframes bodycamLightBlink {
				0%,
				79.999% {
					opacity: 0;
				}

				80%,
				100% {
					opacity: 1;
				}
			}
		</style>
	</head>
	<body>
		<img src="./img/light_off.png" alt="" id="lightOff" />
	</body>
</html>
